# Each test ApplicationContext gets its own uniquely-named in-memory database so
# contexts never share state. Combined with a distinct @TestPropertySource per
# integration test class, this keeps every test class fully isolated.
spring.datasource.url=jdbc:h2:mem:movie-${random.uuid};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

booking.hold.ttl-seconds=300
booking.hold.sweep-interval-ms=30000
